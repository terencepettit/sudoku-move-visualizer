  const usedCells = new Set();
  const unitDigit = new Map();

  function place(key) {
    const cell = keyCell(key), digit = keyDigit(key);
    for (const u of CELL_UNITS[cell]) {
      if (unitDigit.has(u * 10 + digit)) return false;
    }
    usedCells.add(cell);
    for (const u of CELL_UNITS[cell]) unitDigit.set(u * 10 + digit, true);
    return true;
  }
  function unplace(key) {
    const cell = keyCell(key), digit = keyDigit(key);
    usedCells.delete(cell);
    for (const u of CELL_UNITS[cell]) unitDigit.delete(u * 10 + digit);
  }

  // BFS from a complete assignment: propagate Sudoku constraints (placed digits
  // eliminate peers; naked singles cascade) plus truth forcing (a truth reduced to
  // 1 remaining key must be placed).
  // Returns the set of eliminated candidate keys, or null if the propagation
  // reaches a Sudoku contradiction (meaning this assignment is unrealisable and
  // must be excluded from the intersection to avoid false positives).
  function propagateAssignment() {
    const elim = new Set();
    const plac = new Map();
    let contradiction = false;

    function eliminate(cell, digit) {
      if (!cands[cell].has(digit)) return;
      const k = candKey(cell, digit);
      elim.add(k);
    }

    const q = chosen.map(k => [keyCell(k), keyDigit(k)]);
    let qi = 0;
    while (qi < q.length && !contradiction) {
      const [pc, pd] = q[qi++];
      if (plac.has(pc)) {
        if (plac.get(pc) !== pd) { contradiction = true; break; }
        continue;
      }
      // Candidate eliminated by a peer already placed — genuine truth-network conflict
      if (elim.has(candKey(pc, pd))) { contradiction = true; break; }
      plac.set(pc, pd);

      for (const d2 of cands[pc]) { if (d2 !== pd) eliminate(pc, d2); }
      for (const u of CELL_UNITS[pc]) {
        for (const peer of UNIT_CELLS[u]) {
          if (peer === pc || !cands[peer].has(pd) || plac.has(peer)) continue;
          eliminate(peer, pd);
        }
      }
      // Truth forcing: a truth reduced to 1 remaining key must be placed
      for (const truth of userTruths) {
        let rc = 0, last = -1;
        for (const k of truth.keys) { if (!elim.has(k)) { if (++rc === 1) last = k; else break; } }
        if (rc === 0) { contradiction = true; break; }
        if (rc === 1 && !plac.has(keyCell(last)))
          q.push([keyCell(last), keyDigit(last)]);
      }
    }
    return contradiction ? null : elim;
  }

  function search(ti) {
    if (assignTimedOut) return;
    if ((ti & 0x7) === 0 && performance.now() - assignStart > ASSIGN_TIME_LIMIT_MS) {
      assignTimedOut = true; return;
    }
    if (ti === n) {
      const elim = propagateAssignment();
      if (elim === null) return; // contradictory assignment — skip, don't pollute intersection
      if (commonElim === null) {
        commonElim = elim;
      } else {
        for (const k of commonElim) { if (!elim.has(k)) commonElim.delete(k); }
        if (commonElim.size === 0) { assignTimedOut = true; } // intersection empty, stop early
      }
      return;
    }
    // Iterate all keys: handle shared satisfiers (cell already placed by a
    // prior truth with the same key) inline, and try independent satisfiers too.
    // Previously we returned early after the first shared satisfier, which skipped
    // valid assignments where this truth is independently satisfied.
    const truth = userTruths[ti];
    for (const key of truth.keys) {
      if (assignTimedOut) return;
      const cell = keyCell(key);
      if (usedCells.has(cell)) {
        // Cell is occupied — only valid if the exact same key was already chosen
        let shared = false;
        for (let j = 0; j < ti; j++) { if (chosen[j] === key) { shared = true; break; } }
        if (!shared) continue;
        chosen[ti] = key;
        search(ti + 1);
        // No unplace needed — we didn't place anything new
        continue;
      }
      if (!place(key)) continue;
      chosen[ti] = key;
      search(ti + 1);
      unplace(key);
    }
  }

  search(0);
  if (assignTimedOut || commonElim === null) return [];

  const elims = [];
  for (const k of commonElim) {
    const cell = keyCell(k), digit = keyDigit(k);
    if (cands[cell].has(digit)) elims.push([cell, digit]);
  }
  return elims;
}

// Shown when the truths decompose into several independent moves: name each group so the user can
// see which truths belong together and split them into separate moves.
function showDecomposedResult(components) {
  const el = document.getElementById('check-result');
  const groups = components
    .map((g, i) => `<div><span style="color:#889">Move ${i + 1}:</span> <span class="cr-covers">${g.map(t => t.label).join(', ')}</span></div>`)
    .join('');
  el.innerHTML =
    `<div class="cr-none">✗ Not a single move</div>` +
    `<div style="margin:5px 0 8px">These truths form ${components.length} independent moves with nothing connecting them — check each one on its own.</div>` +
    groups;
  el.classList.add('visible');
}

function showCheckResult(result, numPC, numFound) {
  const el = document.getElementById('check-result');
  if (!result) {
    el.innerHTML = `<span class="cr-none">No eliminations</span><br><small>Searched ${numPC} potential covers.</small>`;
    el.classList.add('visible');
    return;
  }
  const elimsByCell = new Map();
  for (const [c, d] of result.elims) {
    if (!elimsByCell.has(c)) elimsByCell.set(c, []);
    elimsByCell.get(c).push(d);
  }
  const elimDesc = [...elimsByCell.entries()]
    .map(([c, ds]) => `${cellName(c)}(${ds.sort((a,b)=>a-b).join(',')})`)
    .join(', ');
  const rankTag = result.rank === 0 ? 'Rank-0' : result.rank !== null ? `Rank-${result.rank}` : 'Forcing chains';
  const countNote = result.assignmentCount > 1 ? ` · ${result.assignmentCount} valid assignments` : '';
  // Covers aren't listed here — they're already the LINKS panel. Only the forcing-chain
  // case (no covers) gets a method note, since it has nothing in that panel.
  const methodLine = result.covers
    ? ''
    : `<div><span style="color:#889">Method:</span> truth forcing chain (case-split)</div>`;
  el.innerHTML =
    `<div class="cr-head">✓ ${rankTag}${countNote}</div>` +
    `<div><span style="color:#889">Eliminate:</span> <span class="cr-elims">${elimDesc}</span></div>` +
    methodLine +
    `<button id="apply-elims-btn" onclick="applyEliminations()">Apply Eliminations</button>`;
  el.classList.add('visible');
}

function applyEliminations() {
  if (!lastCheck) return;
  pushUndo();
  for (const [cell, digit] of lastCheck.elims)
    cands[cell].delete(digit);
  lastCheck = null;  // clears the auto-generated links too (derived from lastCheck)
  userTruths = [];   // clear the truths along with their eliminations
  buildGrid();
  applyAllHighlights();
  renderTruthSVG();
  renderTruthPanel();
  clearCheckResult();
}

function clearCheckResult() {
  document.getElementById('check-result').classList.remove('visible');
}

// ── Grid rendering ─────────────────────────────────────────────────────────

// The grid DOM is built once; subsequent renders reuse the same nodes. Cached
// element references let hot loops (highlighting, SVG routing) skip querySelector.
let gridBuilt = false;
const cellEls    = new Array(81);   // .cell divs by cell index
const digitEls   = new Array(81);   // .digit span by cell index
const candGridEls = new Array(81);  // .candidates grid by cell index
const candEls    = new Array(729);  // .cand span by candKey

// Inline styles that applyAllHighlights sets and that a render must clear.
const HL_PROPS = ['background','color','fontWeight','border','borderRadius','width','height',
                  'justifySelf','alignSelf','position','zIndex','boxShadow'];

function buildGridStructure() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';

  for (let i = 0; i < 81; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    cell.dataset.row = cellRow(i);
    cell.dataset.col = cellCol(i);
    // Place into the explicit cell tracks (odd-numbered); even tracks are the
    // gap tracks that render as grid lines. Avoids auto-placement into gaps.
    cell.style.gridColumn = String(2 * cellCol(i) + 1);
    cell.style.gridRow    = String(2 * cellRow(i) + 1);

    const digit = document.createElement('span');
    digit.className = 'digit';
    cell.appendChild(digit);
    digitEls[i] = digit;

    const cg = document.createElement('div');
    cg.className = 'candidates';
    for (let v = 1; v <= 9; v++) {
      const span = document.createElement('span');
      span.className = 'cand';
      span.dataset.val = v;
      // Nudge each candidate so all 9 get unique, EVENLY-spaced x and y positions
      // (so row/column truth lines are equally spaced, not clustered in threes).
      // Even spacing requires the offset to be exactly 1/3 of the candidate
      // grid-track spacing: track = (cell 70 − 2×6 padding)/3, so N = that/3 = 58/9.
      const ri = Math.floor((v - 1) / 3), ci = (v - 1) % 3, N = 58 / 9;
      span.style.transform = `translate(${(ri - 1) * N}px, ${(1 - ci) * N}px)`;
      cg.appendChild(span);
      candEls[candKey(i, v)] = span;
    }
    cell.appendChild(cg);
    candGridEls[i] = cg;

    gridEl.appendChild(cell);
    cellEls[i] = cell;
  }

  // Dark box separators over the light background: two vertical + two horizontal, in the wide
  // gap tracks (6, 12) at the box boundaries. Thin 1px gaps keep the light background.
  for (const t of [6, 12]) {
    const v = document.createElement('div');
    v.className = 'box-line';
    v.style.gridColumn = String(t); v.style.gridRow = '1 / -1';
    gridEl.appendChild(v);
    const h = document.createElement('div');
    h.className = 'box-line';
    h.style.gridRow = String(t); h.style.gridColumn = '1 / -1';
    gridEl.appendChild(h);
  }

  gridBuilt = true;
}

// Update the existing grid to the current state without tearing down the DOM.
function buildGrid() {
  if (!gridBuilt) buildGridStructure();

  for (let i = 0; i < 81; i++) {
    const cell = cellEls[i];
    cell.classList.toggle('sel', i === selIdx);
    // Cosmetic highlight sits on the cell background — below digits, candidates
    // and the truth-line SVG overlay. Empty string falls back to the CSS default.
    cell.style.background = cellBackground(cellColors[i]);

    if (given[i]) {
      cell.classList.toggle('solved', solvedCells.has(i));
      cell.classList.toggle('given',  !solvedCells.has(i));
      digitEls[i].textContent = given[i];
      digitEls[i].style.display = '';
      candGridEls[i].style.display = 'none';
    } else {
      cell.classList.remove('given', 'solved');
      digitEls[i].style.display = 'none';
      candGridEls[i].style.display = '';
      for (let v = 1; v <= 9; v++) {
        const span = candEls[candKey(i, v)];
        const present = cands[i].has(v);
        span.classList.toggle('present', present);
        span.textContent = present ? v : '';
        // Clear any highlight styling left over from a previous render.
        for (const p of HL_PROPS) span.style[p] = '';
      }
    }
  }
}

function applyAllHighlights() {
  const setBadge = (el, bg, fg) => {
    el.style.background  = bg;
    el.style.color       = fg;
    el.style.fontWeight  = '500';
    el.style.border      = 'none';          // no black hairline: it fought the truth/link lines
    el.style.borderRadius= '4px';           // matches the cell square's rx
    el.style.width       = '17px';
    el.style.height      = '17px';
    el.style.justifySelf = 'center';
    el.style.alignSelf   = 'center';
    el.style.position    = 'relative';
    el.style.zIndex      = '1';
    el.style.boxShadow   = '';
  };

  const truthKeySet = new Set(userTruths.flatMap(t => t.keys));

  // Truth candidates → solid blue fill (≥1 true)
  for (const truth of userTruths)
    for (const k of truth.keys) { const el = candEl(k); if (el) setBadge(el, TRUTH_COLOR, '#fff'); }

  // Eliminations → red (overrides). A blue ring marks a cannibalistic elim that
  // was also a truth key. (Non-eliminated link candidates are left untouched.)
  if (lastCheck) {
    for (const [c, d] of lastCheck.elims) {
      const k = candKey(c, d);
      const el = candEl(k);
      if (el) {
        setBadge(el, ELIM_COLOR, '#fff');
        // `inset` so the ring grows inward — an outward shadow would make this badge visibly
        // larger than every other one.
        el.style.boxShadow = truthKeySet.has(k) ? `inset 0 0 0 2px ${TRUTH_COLOR}` : '';
      }
    }
  }
}

function candEl(k) {
  return candEls[k] || null;
}

function candCenter(k) {
  const el = candEls[k];
  if (!el) return null;
  const wrap = document.getElementById('grid-wrap').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return [r.left + r.width / 2 - wrap.left, r.top + r.height / 2 - wrap.top];
}

function cellCenter(cellIdx) {
  const el = cellEls[cellIdx];
  if (!el) return null;
  const wrap = document.getElementById('grid-wrap').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return [r.left + r.width / 2 - wrap.left, r.top + r.height / 2 - wrap.top];
}

// ── Truth SVG ──────────────────────────────────────────────────────────────

// SVG path string through pts (array of [x,y]) with each interior corner rounded to radius r
// (clamped to half the shorter adjacent segment). A plain line path when r is 0 or pts has <3.
function roundedPath(pts, r) {
  if (!pts.length) return '';
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length - 1; i++) {
    const [px, py] = pts[i - 1], [cx, cy] = pts[i], [nx, ny] = pts[i + 1];
    const inLen = Math.hypot(cx - px, cy - py) || 1, outLen = Math.hypot(nx - cx, ny - cy) || 1;
    const rr = Math.min(r, inLen / 2, outLen / 2);
    if (rr <= 0.01) { d += ` L ${cx} ${cy}`; continue; }
    const a = [cx - (cx - px) / inLen * rr, cy - (cy - py) / inLen * rr];
    const b = [cx + (nx - cx) / outLen * rr, cy + (ny - cy) / outLen * rr];
    d += ` L ${a[0]} ${a[1]} Q ${cx} ${cy} ${b[0]} ${b[1]}`;
  }
  const last = pts[pts.length - 1];
  return d + ` L ${last[0]} ${last[1]}`;
}

function renderTruthSVG() {
  const svg = document.getElementById('truth-svg');
  svg.innerHTML = '';
  const wrap = document.getElementById('grid-wrap').getBoundingClientRect();
  const gridR = document.getElementById('grid').getBoundingClientRect();
  // All coordinates below are derived from getBoundingClientRect, which already reflects
  // any CSS `zoom` applied to #grid-wrap at narrow widths. The SVG has no intrinsic
  // viewBox, so its user space would otherwise default to its unzoomed CSS width and the
  // overlay would render shrunk toward the origin. Pinning the viewBox to the current
  // (zoomed) wrap size makes the measured pixel coordinates map 1:1 at any zoom level.
  svg.setAttribute('viewBox', `0 0 ${wrap.width} ${wrap.height}`);

  // A link only connects meaningful nodes: the truth candidates it covers, and the
  // eliminated candidates it explains. Non-eliminated link candidates are ignored.
  const truthKeySet = new Set(userTruths.flatMap(t => t.keys));
  const elimKeySet  = new Set(((lastCheck && lastCheck.elims) || []).map(([c, d]) => candKey(c, d)));

  // Two-pass link routing so an L-route's elbow can avoid straight links regardless of draw order.
  // Pass 1 (planningPass) runs the routing for every cover and gathers the *straight* link segments —
  // the only ones whose position doesn't depend on any elbow choice. Pass 2 seeds the overlap
  // registry with them, so each L-elbow is scored against every straight link up front. (T-junction
  // stubs are left out of the seed: their position depends on the elbows themselves, so pre-seeding
  // pass-1 stub positions would bias the pass-2 choices; they're still registered as pass 2 draws
  // them.) Grid-line intervals: {horiz, line (row for horiz | col for vert), lo, hi}.
  let planningPass = false;
  const straightSegs = [];      // position-independent straight link segments, gathered in pass 1
  const linkSegRegistry = [];   // what L-elbow scoring sees in pass 2 (seeded with straightSegs)

  // Position of digit in a cell (works even if the digit isn't a current candidate)
  function ghostCandCenter(cellIdx, digit) {
    const cellEl = cellEls[cellIdx];
    if (!cellEl) return null;
    const r = cellEl.getBoundingClientRect();
    const col = (digit - 1) % 3, row = Math.floor((digit - 1) / 3);
    const pad = 3, colW = (r.width - pad * 2) / 3, rowH = (r.height - pad * 2) / 3;
    return [
      r.left - wrap.left + pad + col * colW + colW / 2,
      r.top  - wrap.top  + pad + row * rowH + rowH / 2
    ];
  }

  // Segments are appended here. For a multi-segment truth this is a <g opacity>
  // group so overlapping segments of the same truth don't stack into a darker
  // stroke — the group's opacity is applied once, after its contents are flattened.
  let lineTarget = svg;

  // Draw a connector as a single polyline through the given points. Only the two
  // free ends (at digit badges) are trimmed back by GAP; interior corners are kept
  // exact and joined with a miter so the bend is filled cleanly (no cap notch).
  // GAP is just under the badge half-width (17px badge → 8.5px) so lines meet the edge.
  function drawPolyline(pts, color, dashed, width = 3.5) {
    const GAP = 8;
    const p = pts.map(a => [a[0], a[1]]);
    const n = p.length;
    const trim = (from, to) => {
      const dx = p[to][0] - p[from][0], dy = p[to][1] - p[from][1];
      const len = Math.hypot(dx, dy);
      if (len > GAP) { p[from][0] += dx / len * GAP; p[from][1] += dy / len * GAP; }
    };
    trim(0, 1);          // start end → toward next point
    trim(n - 1, n - 2);  // finish end → toward previous point
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', roundedPath(p, LINK_CORNER_R));   // rounded elbows (matches cell-square rx)
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', dashed ? '2.5' : String(width));
    path.setAttribute('stroke-linecap', dashed ? 'round' : 'butt');
    path.setAttribute('stroke-linejoin', 'round');
    if (dashed) path.setAttribute('stroke-dasharray', '0.1,5');
    lineTarget.appendChild(path);
  }

  // Draw a link as a tube: a faint (10%) coloured interior band with a 1px coloured edge on each
  // side, half-width W. The near-transparent centre lets anything it stacks over (a truth line, a
  // narrower link) show through. Badge ends trim back by GAP; a T-junction end (trimStart/trimEnd
  // false) is kept so the tube reaches the line it joins. Segments are axis-aligned.
  function drawTube(pts, color, W, trimStart = true, trimEnd = true, cuts = null) {
    const GAP = 8, FILL_OP = LINK_TUBE_FILL_OP, EDGE_OP = LINK_EDGE_OP;
    const p = pts.map(a => [a[0], a[1]]);
    const n = p.length;
    // Trim a badge end inward by GAP along its segment direction (skipped for T-junction ends).
    const trim = (from, to) => {
      const dx = p[to][0] - p[from][0], dy = p[to][1] - p[from][1], len = Math.hypot(dx, dy);
      if (len > GAP) { p[from][0] += dx / len * GAP; p[from][1] += dy / len * GAP; }
    };
    if (trimStart) trim(0, 1);
    if (trimEnd)   trim(n - 1, n - 2);
    // Left-perpendicular unit of each segment (rotate direction 90°: (dx,dy) → (-dy,dx)).
    const perp = [];
    for (let i = 0; i < n - 1; i++) {
      const dx = Math.sign(p[i + 1][0] - p[i][0]), dy = Math.sign(p[i + 1][1] - p[i][1]);
      perp.push([-dy, dx]);
    }
    // Build an offset edge as ONE polyline: each interior vertex is offset by the sum of its two
    // adjacent segment perpendiculars — the miter point of the right-angle bend — so the edge
    // turns the corner in a single clean vertex instead of two segments overshooting and crossing.
    const offset = sgn => p.map((pt, i) => {
      const pa = perp[i === 0 ? 0 : i - 1], pb = perp[i === n - 1 ? n - 2 : i];
      const interior = i > 0 && i < n - 1;
      const ox = interior ? pa[0] + pb[0] : pa[0], oy = interior ? pa[1] + pb[1] : pa[1];
      return [pt[0] + ox * sgn * W, pt[1] + oy * sgn * W];
    });
    const stroke = (d, width, op) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', d); el.setAttribute('fill', 'none');
      el.setAttribute('stroke', color); el.setAttribute('stroke-width', width);
      el.setAttribute('opacity', op); el.setAttribute('stroke-linejoin', 'round');
      lineTarget.appendChild(el);
    };
    // Fill band: thick centre stroke; round join gives the outer corner a radius of W.
    stroke(roundedPath(p, 0), 2 * W, FILL_OP);
    // Edges: rounded outline paths — but a straight edge carrying a cut (a T-junction opening) is
    // drawn in pieces with a gap, so the joining tube's hollow flows through the wall.
    const drawEdge = sgn => {
      const e = offset(sgn);
      if (!cuts || !cuts.length) { stroke(roundedPath(e, LINK_CORNER_R), 1, EDGE_OP); return; }
      // Walk the offset polyline; where a straight segment carries a T-junction cut, break the edge
      // so the joining tube's hollow flows through the gap. Cuts land in a segment's interior (docks
      // sit a half-width off corners), so uncut corners keep flowing into the next sub-polyline and
      // stay rounded.
      const subs = [];
      let cur = [e[0]];
      for (let i = 0; i < e.length - 1; i++) {
        const A = e[i], B = e[i + 1];
        const vert = Math.abs(A[0] - B[0]) < 0.5, fixed = vert ? A[0] : A[1];
        const gaps = cuts.filter(c => c.vert === vert && Math.abs(c.fixed - fixed) < 0.6);
        if (!gaps.length) { cur.push(B); continue; }
        const a0 = vert ? A[1] : A[0], a1 = vert ? B[1] : B[0], dir = a1 >= a0 ? 1 : -1;
        const ptAt = v => vert ? [fixed, v] : [v, fixed];
        let ivs = [[Math.min(a0, a1), Math.max(a0, a1)]];
        for (const c of gaps) {
          const nx = [];
          for (const [s, t] of ivs) { if (c.hi <= s || c.lo >= t) nx.push([s, t]); else { if (c.lo > s) nx.push([s, c.lo]); if (c.hi < t) nx.push([c.hi, t]); } }
          ivs = nx;
        }
        ivs = ivs.filter(([s, t]) => t - s > 0.5).sort((x, y) => dir > 0 ? x[0] - y[0] : y[0] - x[0]);
        for (let j = 0; j < ivs.length; j++) {
          const s = dir > 0 ? ivs[j][0] : ivs[j][1], t = dir > 0 ? ivs[j][1] : ivs[j][0];
          if (j === 0 && Math.abs(s - a0) < 0.5) cur.push(ptAt(t));
          else { if (cur.length >= 2) subs.push(cur); cur = [ptAt(s), ptAt(t)]; }
        }
      }
      if (cur.length >= 2) subs.push(cur);
      for (const sub of subs) stroke(roundedPath(sub, LINK_CORNER_R), 1, EDGE_OP);
    };
    drawEdge(1); drawEdge(-1);
  }

  // Turn a link's raw routes into clean tubes: decompose to axis-aligned segments, MERGE collinear
  // runs (so an L-route arm and a collinear stub become one straight bar), chain remaining corners
  // into rounded polylines, and where a stub meets another tube's side draw a flowing T-junction
  // (dock at the near wall + cut a gap in it).
  function renderLinkTubes(routes, color, W) {
    const near = (a, b) => Math.abs(a - b) < 0.6;
    const raw = [];
    for (const rt of routes) {
      const P = rt.pts; if (!P || !P[0] || !P[P.length - 1]) continue;
      if (P.length === 2) raw.push({ a: P[0].slice(), b: P[1].slice(), ba: rt.ts, bb: rt.te });
      else { raw.push({ a: P[0].slice(), b: P[1].slice(), ba: rt.ts, bb: false });
             raw.push({ a: P[1].slice(), b: P[2].slice(), ba: false, bb: rt.te }); }
    }
    // Merge collinear segments (same line, touching/overlapping ranges); the extreme badges survive.
    const groups = new Map();
    for (const s of raw) {
      const horiz = near(s.a[1], s.b[1]);
      const k = horiz ? 'h' + Math.round(s.a[1]) : 'v' + Math.round(s.a[0]);
      (groups.get(k) || groups.set(k, []).get(k)).push(s);
    }
    const merged = [];
    const mkSeg = (iv, horiz, fixed) => horiz
      ? { a: [iv.lo, fixed], b: [iv.hi, fixed], ba: iv.loB, bb: iv.hiB, horiz: true }
      : { a: [fixed, iv.lo], b: [fixed, iv.hi], ba: iv.loB, bb: iv.hiB, horiz: false };
    for (const [k, g] of groups) {
      const horiz = k[0] === 'h', fixed = horiz ? g[0].a[1] : g[0].a[0];
      const items = g.map(s => { const av = horiz ? s.a[0] : s.a[1], bv = horiz ? s.b[0] : s.b[1];
        return av <= bv ? { lo: av, hi: bv, loB: s.ba, hiB: s.bb } : { lo: bv, hi: av, loB: s.bb, hiB: s.ba }; })
        .sort((x, y) => x.lo - y.lo);
      let cur = null;
      for (const it of items) {
        if (cur && it.lo <= cur.hi + 0.5) { if (it.hi > cur.hi) { cur.hi = it.hi; cur.hiB = it.hiB; } }
        else { if (cur) merged.push(mkSeg(cur, horiz, fixed)); cur = { lo: it.lo, hi: it.hi, loB: it.loB, hiB: it.hiB }; }
      }
      if (cur) merged.push(mkSeg(cur, horiz, fixed));
    }
    // Node graph (shared endpoints) for chaining corners.
    const nkey = p => Math.round(p[0]) + ',' + Math.round(p[1]);
    const nodes = new Map();
    for (const s of merged) for (const e of ['a', 'b']) { const kk = nkey(s[e]); (nodes.get(kk) || nodes.set(kk, []).get(kk)).push({ s, e }); }
    const onInt = (p, s) => s.horiz
      ? (near(p[1], s.a[1]) && p[0] > Math.min(s.a[0], s.b[0]) + 0.5 && p[0] < Math.max(s.a[0], s.b[0]) - 0.5)
      : (near(p[0], s.a[0]) && p[1] > Math.min(s.a[1], s.b[1]) + 0.5 && p[1] < Math.max(s.a[1], s.b[1]) - 0.5);
    // Chain segments through degree-2 shared corner nodes into rounded polylines.
    const used = new Set(), polys = [];
    for (const s0 of merged) {
      if (used.has(s0)) continue;
      used.add(s0);
      const pts = [s0.a.slice(), s0.b.slice()];
      const ends = [{ badge: s0.ba }, { badge: s0.bb }];
      const walk = (fromP, seg, prepend) => {
        let p = fromP, cs = seg;
        while (true) {
          const nd = nodes.get(nkey(p));
          if (!nd || nd.length !== 2) break;
          const nx = nd.find(x => x.s !== cs);
          if (!nx || used.has(nx.s)) break;
          used.add(nx.s);
          const far = (nx.e === 'a' ? nx.s.b : nx.s.a), farB = (nx.e === 'a' ? nx.s.bb : nx.s.ba);
          if (prepend) { pts.unshift(far.slice()); ends[0] = { badge: farB }; }
          else { pts.push(far.slice()); ends[1] = { badge: farB }; }
          cs = nx.s; p = far;
        }
      };
      walk(s0.a, s0, true); walk(s0.b, s0, false);
      polys.push({ pts, ends });
    }
    // T-junctions: a non-badge terminal endpoint lying on another polyline's interior → dock at the
    // near wall and cut a gap in it so the two hollows flow together.
    for (const poly of polys) {
      for (let side = 0; side < 2; side++) {
        if (poly.ends[side].badge) continue;
        const endPt = side === 0 ? poly.pts[0] : poly.pts[poly.pts.length - 1];
        const innerPt = side === 0 ? poly.pts[1] : poly.pts[poly.pts.length - 2];
        let target = null;
        for (const t of polys) {
          if (t === poly) continue;
          for (let i = 0; i < t.pts.length - 1; i++) {
            const seg = { a: t.pts[i], b: t.pts[i + 1], horiz: near(t.pts[i][1], t.pts[i + 1][1]) };
            if (onInt(endPt, seg)) { target = { poly: t, seg }; break; }
          }
          if (target) break;
        }
        if (!target) continue;
        const s = target.seg;
        if (s.horiz) endPt[1] += Math.sign(innerPt[1] - endPt[1]) * W;
        else         endPt[0] += Math.sign(innerPt[0] - endPt[0]) * W;
        (target.poly.cuts || (target.poly.cuts = [])).push(s.horiz
          ? { vert: false, fixed: endPt[1], lo: endPt[0] - W, hi: endPt[0] + W }
          : { vert: true,  fixed: endPt[0], lo: endPt[1] - W, hi: endPt[1] + W });
      }
    }
    for (const poly of polys)
      drawTube(poly.pts, color, W, poly.ends[0].badge, poly.ends[1].badge, poly.cuts || null);
  }

  // Render one set (truth or link). Truths draw as a solid line / filled square; links draw as
  // a hollow "tube" — a transparent band with the unit colour on its two long edges — / a
  // bordered square, so a truth and any number of links over the same run stack and stay visible.
  function renderSet(set, dashed) {
    const color = set.color;

    if (set.isCellTruth) {
      // A cell set is a square, not a line — it contributes no segments to plan, so pass 1 must skip
      // it entirely. Drawing it in both passes would stack two strokes (0.7 over 0.7 → 0.91) and two
      // fills, making cell links render darker than every other link.
      if (planningPass) return;
      const el = cellEls[keyCell(set.fromKey)];
      if (!el) return;
      const r = el.getBoundingClientRect();
      // Centered square half the cell's size: each side sits midway between the
      // cell edge and the cell centre. Cell truth → filled; cell link → hollow bordered.
      const cx = (r.left + r.right) / 2 - wrap.left;
      const cy = (r.top + r.bottom) / 2 - wrap.top;
      const halfW = r.width / 4, halfH = r.height / 4;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', cx - halfW);
      rect.setAttribute('y', cy - halfH);
      rect.setAttribute('width',  halfW * 2);
      rect.setAttribute('height', halfH * 2);
      rect.setAttribute('rx', '4');
      rect.setAttribute('fill', color);
      // Truth: a tint with a crisp border — it marks the region, the badges on top are the content.
      // Link: fainter fill and a lighter 1px border (and grey), so the two never read alike.
      rect.setAttribute('fill-opacity',   String(dashed ? LINK_CELL_FILL_OP : CELL_TRUTH_FILL_OP));
      rect.setAttribute('stroke', color);
      rect.setAttribute('stroke-width',   dashed ? '1' : '1.5');
      rect.setAttribute('stroke-opacity', String(dashed ? LINK_EDGE_OP : CELL_TRUTH_EDGE_OP));
      svg.appendChild(rect);
    } else {
      const digit = keyDigit(set.keys[0]);
      const tubeW = dashed ? LINK_TUBE_HALF[set.unit < 9 ? 'row' : set.unit < 18 ? 'col' : 'box'] : 0;
      const ptOf = (r, c) => candCenter(candKey(r * 9 + c, digit)) || ghostCandCenter(r * 9 + c, digit);

      // Pass 1 only plans routes (to gather forced segments); it draws nothing.
      if (!planningPass) {
        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.setAttribute('opacity', dashed ? '1' : '0.7');
        svg.appendChild(group);
        lineTarget = group;
      }

      if (!dashed) {
        // Truth: chain candidates in sorted order, each as a straight / L-routed solid line.
        // Box truths draw 2px wider than row/column truths.
        const truthW = set.unit >= 18 ? 5.5 : 3.5;
        const sorted = [...set.keys].sort((a, b) => keyCell(a) - keyCell(b));
        for (let i = 0; i < sorted.length - 1; i++) {
          const c1 = keyCell(sorted[i]), c2 = keyCell(sorted[i + 1]);
          const r1 = Math.floor(c1 / 9), l1 = c1 % 9, r2 = Math.floor(c2 / 9), l2 = c2 % 9;
          const p1 = ptOf(r1, l1), p2 = ptOf(r2, l2);
          if (!p1 || !p2) continue;
          if (r1 !== r2 && l1 !== l2) {
            const [tr, tl] = r1 <= r2 ? [r1, l1] : [r2, l2];
            const [br, bl] = r1 <= r2 ? [r2, l2] : [r1, l1];
            drawPolyline([ptOf(br, bl), [ptOf(br, bl)[0], ptOf(tr, tl)[1]], ptOf(tr, tl)], color, false, truthW);
          } else {
            drawPolyline([p1, p2], color, false, truthW);
          }
        }
        return;
      }

      // Link: chain the truth candidates, then attach each eliminated candidate to the tree. Where
      // an elimination lines up with an already-drawn segment, connect it by the shortest
      // perpendicular drop and stop at a T-junction (rather than L-routing to a truth's centre and
      // running an arm back along an existing line, which doubles that line). Each seg records its
      // fixed pixel coordinate (y for a horizontal seg, x for a vertical one), sourced from a
      // present endpoint, so an absent foot cell never needs its own (hidden) candidate looked up.
      // segs (grid) drive drop-target search; routes (pixel) are handed to renderLinkTubes, which
      // merges collinear runs and draws clean tubes + flowing T-junctions.
      const segs = [], routes = [];
      // buildGrid nudges every candidate off its 3×3 track so that all nine digits get distinct,
      // evenly-spaced x and y within a cell — which is precisely what stops two different digits'
      // lines from ever sharing a lane. So a tube's lane is just its grid row/column plus its digit:
      // two segments can only stack when they are the SAME digit on the same row/column. Scoring per
      // lane (not per bare row/col) therefore never counts different-digit lines, which by
      // construction can't touch. (Perpendicular crossings differ in orientation, so they're never
      // counted either.) Only lane equality is tested, so any key injective in (row|col, digit) works.
      const hLane = row => row * 9 + (digit - 1);   // horizontal (constant-y) lane
      const vLane = col => col * 9 + (digit - 1);   // vertical (constant-x) lane
      // `straight` marks a position-independent straight link segment (only these seed pass 1); a
      // T-junction stub or an L-route arm passes false. Pass 1 gathers the straights; pass 2 registers
      // everything that isn't a straight (straights are already in the registry from the seed).
      const addSeg = (r1, c1, r2, c2, pt, straight) => {
        segs.push({
          horiz: r1 === r2, vert: c1 === c2,
          rlo: Math.min(r1, r2), rhi: Math.max(r1, r2), clo: Math.min(c1, c2), chi: Math.max(c1, c2),
          pix: r1 === r2 ? pt[1] : pt[0] });
        const gi = r1 === r2
          ? { horiz: true,  lane: hLane(r1), lo: Math.min(c1, c2), hi: Math.max(c1, c2) }
          : { horiz: false, lane: vLane(c1), lo: Math.min(r1, r2), hi: Math.max(r1, r2) };
        if (planningPass) { if (straight) straightSegs.push(gi); }
        else if (!straight) linkSegRegistry.push(gi);
      };
      // Collinear-overlap length of a candidate lane interval against already-drawn links.
      const overlapScore = (horiz, lane, lo, hi) => {
        let s = 0;
        for (const g of linkSegRegistry)
          if (g.horiz === horiz && g.lane === lane) s += Math.max(0, Math.min(hi, g.hi) - Math.max(lo, g.lo));
        return s;
      };
      // Route between two present candidate cells: straight, or L-routed. An L has two possible
      // elbows; pick whichever's two arms stack least on links already drawn this render (tie → the
      // vertical-from-lower / horizontal-into-upper convention, so unconstrained cases stay stable).
      const routeCells = (r1, c1, r2, c2) => {
        const p1 = ptOf(r1, c1), p2 = ptOf(r2, c2);
        if (!p1 || !p2) return;
        if (r1 !== r2 && c1 !== c2) {
          const topP = r1 <= r2 ? p1 : p2, botP = r1 <= r2 ? p2 : p1;
          const [tr, tc] = r1 <= r2 ? [r1, c1] : [r2, c2];   // top = smaller row
          const [br, bc] = r1 <= r2 ? [r2, c2] : [r1, c1];   // bottom = larger row
          const cLo = Math.min(bc, tc), cHi = Math.max(bc, tc);
          // A: vertical down bottom's column (bc) + horizontal along top's row (tr) — corner (bc,tr).
          // B: horizontal along bottom's row (br) + vertical up top's column (tc) — corner (tc,br).
          const scoreA = overlapScore(false, vLane(bc), tr, br) + overlapScore(true, hLane(tr), cLo, cHi);
          const scoreB = overlapScore(true, hLane(br), cLo, cHi) + overlapScore(false, vLane(tc), tr, br);
          if (scoreB < scoreA) {
            routes.push({ pts: [botP, [topP[0], botP[1]], topP], ts: true, te: true });
            addSeg(br, bc, br, tc, botP, false); addSeg(br, tc, tr, tc, topP, false);
          } else {
            routes.push({ pts: [botP, [botP[0], topP[1]], topP], ts: true, te: true });
            addSeg(br, bc, tr, bc, botP, false); addSeg(tr, bc, tr, tc, topP, false);
          }
        } else {
          routes.push({ pts: [p1, p2], ts: true, te: true });
          addSeg(r1, c1, r2, c2, p1, true);
        }
      };
      const tKeys = set.keys.filter(k => truthKeySet.has(k)).sort((a, b) => keyCell(a) - keyCell(b));
      const eKeys = set.keys.filter(k => elimKeySet.has(k) && !truthKeySet.has(k));
      for (let i = 0; i < tKeys.length - 1; i++) {
        const a = keyCell(tKeys[i]), b = keyCell(tKeys[i + 1]);
        routeCells(Math.floor(a / 9), a % 9, Math.floor(b / 9), b % 9);
      }
      const connected = tKeys.map(keyCell);
      const remaining = eKeys.map(keyCell);
      while (remaining.length && connected.length) {
        // Grow the tree by the elimination nearest (Manhattan) to any connected node.
        let bi = -1, bnode = -1, bnd = Infinity;
        for (let i = 0; i < remaining.length; i++) {
          const er = Math.floor(remaining[i] / 9), ec = remaining[i] % 9;
          for (const c of connected) {
            const d = Math.abs(Math.floor(c / 9) - er) + Math.abs(c % 9 - ec);
            if (d < bnd) { bnd = d; bi = i; bnode = c; }
          }
        }
        if (bi < 0) break;
        const e = remaining.splice(bi, 1)[0], er = Math.floor(e / 9), ec = e % 9;
        // Shortest perpendicular drop onto an existing segment (foot shares the elim's row/col).
        let dropDist = Infinity, footR = -1, footC = -1, footSeg = null;
        for (const s of segs) {
          if (s.horiz && ec >= s.clo && ec <= s.chi) { const d = Math.abs(er - s.rlo); if (d > 0 && d < dropDist) { dropDist = d; footR = s.rlo; footC = ec; footSeg = s; } }
          if (s.vert  && er >= s.rlo && er <= s.rhi) { const d = Math.abs(ec - s.clo); if (d > 0 && d < dropDist) { dropDist = d; footR = er; footC = s.clo; footSeg = s; } }
        }
        const elimPt = ptOf(er, ec);
        if (elimPt && footSeg && dropDist <= bnd) {
          // Stub runs to the target's centre-line; renderLinkTubes docks + cuts the wall for the T.
          const footPix = footSeg.horiz ? [elimPt[0], footSeg.pix] : [footSeg.pix, elimPt[1]];
          const footBadge = truthKeySet.has(candKey(footR * 9 + footC, digit)) || elimKeySet.has(candKey(footR * 9 + footC, digit));
          routes.push({ pts: [elimPt, footPix], ts: true, te: footBadge });
          addSeg(er, ec, footR, footC, elimPt, false);   // stub position depends on elbows → not a seed
        } else {
          routeCells(er, ec, Math.floor(bnode / 9), bnode % 9);
        }
        connected.push(e);
      }
      if (!planningPass) renderLinkTubes(routes, color, tubeW);
    }
  }

  // Truth lines are obstacles too: an L-elbow should avoid stacking a link on a truth's line the
  // same way it avoids other links. (This only steers elbow *choices*; a link running straight along
  // a truth it covers has no choice and still stacks — the truth's solid line then sits inside the
  // hollow tube, as intended.) Compute each line-truth's lane-segments up front, mirroring how the
  // truth is drawn (row/col = one straight run; box = chained with the corner-at-[botCol,topRow] L).
  const truthSegs = [];
  for (const t of userTruths) {
    if (t.isCellTruth) continue;                         // cell truths render as squares, not lines
    const d = keyDigit(t.keys[0]);
    const hL = r => r * 9 + (d - 1), vL = c => c * 9 + (d - 1);   // lane = row|col + digit (see hLane)
    const push = (r1, c1, r2, c2) => {
      if (r1 === r2) truthSegs.push({ horiz: true,  lane: hL(r1), lo: Math.min(c1, c2), hi: Math.max(c1, c2) });
      else if (c1 === c2) truthSegs.push({ horiz: false, lane: vL(c1), lo: Math.min(r1, r2), hi: Math.max(r1, r2) });
    };
    const cells = t.keys.map(keyCell).sort((a, b) => a - b);
    for (let i = 0; i < cells.length - 1; i++) {
      const r1 = Math.floor(cells[i] / 9), c1 = cells[i] % 9, r2 = Math.floor(cells[i + 1] / 9), c2 = cells[i + 1] % 9;
      if (r1 !== r2 && c1 !== c2) {                       // L-route: vertical down bottom col, horizontal along top row
        const [tr, tc] = r1 <= r2 ? [r1, c1] : [r2, c2], [br, bc] = r1 <= r2 ? [r2, c2] : [r1, c1];
        push(br, bc, tr, bc); push(tr, bc, tr, tc);
      } else push(r1, c1, r2, c2);
    }
  }

  // Draw order (bottom → top): cell truths (filled squares) behind everything; then links; then
  // BOX line truths; then row/column line truths on top (a truth's solid centre line sits in the
  // hollow middle of any tube it stacks with, and box truths sit behind the thinner row/col ones).
  // Pass 1: plan every cover's link route to gather all straight link segments (no drawing), then seed
  // the overlap registry with them + the truth lines so pass-2 L-elbows avoid both regardless of order.
  if (showLinks) {
    planningPass = true;
    for (const link of ((lastCheck && lastCheck.covers) || [])) if (!link.hidden) renderSet(link, true);
    planningPass = false;
    for (const s of straightSegs) linkSegRegistry.push(s);
    for (const s of truthSegs) linkSegRegistry.push(s);
  }
  // Pass 2: draw in z-order (cell truths behind; links; box truths; row/col truths on top).
  for (const truth of userTruths) if (truth.isCellTruth) renderSet(truth, false);
  if (showLinks)
    for (const link of ((lastCheck && lastCheck.covers) || [])) if (!link.hidden) renderSet(link, true);
  for (const truth of userTruths) if (!truth.isCellTruth && truth.unit >= 18) renderSet(truth, false);
  for (const truth of userTruths) if (!truth.isCellTruth && truth.unit < 18) renderSet(truth, false);
}

// Toggle visibility of the auto-generated cover links on the grid.
function toggleLinks() {
  showLinks = !showLinks;
  updateLinksToggle();
  renderTruthSVG();
}

function updateLinksToggle() {
  const btn = document.getElementById('btn-links');
  // The label stays "Links" — the switch carries the state. (Setting textContent here would also
  // wipe the .switch span, since it's a child of the button.)
  if (btn) { btn.classList.toggle('active', showLinks); btn.setAttribute('aria-pressed', String(showLinks)); }
}

// ── Dark mode ──────────────────────────────────────────────────────────────
// Manual opt-in only. data-theme flips the CSS chrome; refreshVizColors swaps the JS viz palette.
// Colours are resolved and STORED on each truth/cover when it's created, so re-derive those too,
// then re-render (buildGrid clears inline badge styles, the rest repaints with the new colours).
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = theme;
  refreshVizColors();
  for (const t of userTruths) t.color = truthTypeColor(t);
  if (lastCheck && lastCheck.covers)
    for (const c of lastCheck.covers)
      c.color = (c.isCellTruth || c.unit < 18) ? LINK_LINE_GRAY : truthTypeColor(c);
  buildGrid(); applyAllHighlights(); renderTruthSVG(); renderTruthPanel(); buildLegend();
  updateThemeToggle();
}

function updateThemeToggle() {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  const dark = theme === 'dark';
  btn.textContent = dark ? '☀' : '☾';
  btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
  btn.setAttribute('aria-pressed', String(dark));
}

// Opacity (0–100) of the big given/solved digits, via a CSS variable.
function setDigitOpacity(pct) {
  document.documentElement.style.setProperty('--digit-opacity', pct / 100);
}

function clearDragLine() {
  document.getElementById('drag-svg').innerHTML = '';
}

function updateDragLine(toClientX, toClientY) {
  const svg = document.getElementById('drag-svg');
  svg.innerHTML = '';
  if (!drawState) return;

  const p1 = candCenter(drawState.fromKey);
  if (!p1) return;

  const wrap = document.getElementById('grid-wrap').getBoundingClientRect();
  // Match truth-svg: pin the user space to the current (zoomed) wrap size so the drag
  // line stays aligned when #grid-wrap is scaled by CSS `zoom` at narrow widths.
  svg.setAttribute('viewBox', `0 0 ${wrap.width} ${wrap.height}`);
  const x2 = toClientX - wrap.left;
  const y2 = toClientY - wrap.top;

  const nextColor = TRUTH_COLOR;

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', p1[0]); line.setAttribute('y1', p1[1]);
  line.setAttribute('x2', x2);    line.setAttribute('y2', y2);
  line.setAttribute('stroke', nextColor);
  line.setAttribute('stroke-width', '2');
  line.setAttribute('stroke-dasharray', '5,3');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('opacity', '0.75');
  svg.appendChild(line);
}

// ── Truth panel ────────────────────────────────────────────────────────────

function renderTruthPanel() {
  const panel = document.getElementById('truth-list');
  panel.innerHTML = '';

  if (!userTruths.length) {
    panel.innerHTML = '<div class="no-truths">No truths drawn yet.<br>Switch to Draw Truths mode, then drag between candidates.</div>';
  } else {
    userTruths.forEach((truth, i) => {
      const item = document.createElement('div');
      item.className = 'truth-item';
      item.innerHTML =
        `<span class="truth-swatch" style="background:${truth.color}"></span>` +
        `<span class="truth-label">${truth.label}</span>` +
        `<button class="truth-del" title="Remove" onclick="removeTruth(${i})">×</button>`;
      panel.appendChild(item);
    });
  }

  // Links section — the auto-generated cover from the last valid rank-0 check.
  // Display-only (not user-editable).
  const links = (lastCheck && lastCheck.covers) || [];
  const linkPanel = document.getElementById('link-panel');
  const linkList  = document.getElementById('link-list');
  linkList.innerHTML = '';
  linkPanel.style.display = links.length ? 'flex' : 'none';
  links.forEach((link, i) => {
    const item = document.createElement('div');
    item.className = 'truth-item' + (link.hidden ? ' link-off' : '');
    // A link auto-hidden by the redundancy rules is real, just duplicated by another link over the
    // same candidates — say which, so a struck-through row reads as tidying rather than an error.
    if (link.autoHidden)
      item.title = `Redundant with the ${link.autoHidden} link over the same candidates` +
                   (link.hidden ? ' — auto-hidden.' : '.');
    item.innerHTML =
      `<span class="link-swatch" style="border:2px dashed ${link.color}"></span>` +
      `<span class="truth-label">${link.label}</span>` +
      `<button class="link-toggle" title="${link.hidden ? 'Show this link' : 'Hide this link'}" ` +
      `onclick="toggleLinkVis(${i})">${eyeIcon(link.hidden)}</button>`;
    linkList.appendChild(item);
  });
}

// Small feather-style eye / eye-off icon for the per-link visibility toggle.
function eyeIcon(off) {
  const attrs = 'width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  return off
    ? `<svg ${attrs}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg ${attrs}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

// Toggle one link's visibility on the grid (for de-cluttering before a screenshot). The flag
// lives on the cover object, so a fresh Check Move resets everything to visible.
function toggleLinkVis(i) {
  const covers = lastCheck && lastCheck.covers;
  if (!covers || !covers[i]) return;
  covers[i].hidden = !covers[i].hidden;
  renderTruthSVG();
  renderTruthPanel();
}

// ── Status ─────────────────────────────────────────────────────────────────

let toastTimer = null;

// Transient feedback toast. Errors linger a bit longer; empty msg hides it.
function setStatus(msg, type = '') {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  if (!msg) { el.className = ''; return; }
  el.className = 'show ' + type;
  el.textContent = msg;
  toastTimer = setTimeout(() => el.classList.remove('show'), type === 'err' ? 5000 : 3000);
}

function setChecking() {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  el.className = 'show info';
  el.innerHTML = '<span class="spinner"></span>Checking…';
  document.querySelectorAll('.check-btn').forEach(b => b.disabled = true);
}

function clearChecking() {
  document.querySelectorAll('.check-btn').forEach(b => b.disabled = false);
}

// Static per-mode instruction shown under the toolbar.
const MODE_HINTS = {
  edit:      'Edit — click a candidate to remove it, or click a cell and press 1–9 to place a digit.',
  draw:      'Draw Truths — drag between two candidates to add a truth, or click a cell for a cell-truth.',
  highlight: 'Highlight — pick a colour, then click or drag across cells to shade them.'
};
function updateModeHint() {
  const el = document.getElementById('mode-hint');
  if (el) el.textContent = MODE_HINTS[userMode] || '';
}

// ── Drag event handlers ─────────────────────────────────────────────────────

function setupDragHandlers() {
  const gridEl = document.getElementById('grid');

  // Mousedown: start drag (draw mode) or delete candidate / select cell (edit mode)
  gridEl.addEventListener('mousedown', e => {
    const candSpan = e.target.closest('.cand.present');
    const cellDiv  = e.target.closest('.cell');
    if (!cellDiv) return;
    const i = +cellDiv.dataset.idx;

    if (userMode === 'highlight') {
      e.preventDefault();
      // Snapshot once at the start so the whole paint stroke is a single undo.
      pushUndo();
      // First cell sets the stroke op: clicking a cell already showing the active
      // colour erases it (toggle); otherwise paint. The eraser always erases.
      paintOp = paintColor === null ? 'erase'
              : (cellColors[i] || []).includes(paintColor) ? 'remove' : 'add';
      applyPaint(i);
      return;
    }

    if (userMode === 'draw') {
      e.preventDefault();
      if (candSpan) {
        // Start drawing from this candidate
        const k = candKey(i, +candSpan.dataset.val);
        drawState = { fromKey: k };
      } else {
        // Click on cell body → cell truth
        const truth = cellTruthFromClick(i);
        if (truth) registerTruth(truth);
        else setStatus('Cell has fewer than 2 candidates — cannot create a cell truth.', 'err');
      }
      return;
    }

    // Edit mode
    if (candSpan) {
      // Delete candidate
      e.preventDefault();
      const v = +candSpan.dataset.val;
      if (solution && solution[i] === v) {
        setStatus(`Can't remove ${v} from ${cellName(i)} — that's the solution digit for this cell.`, 'err');
        return;
      }
      pushUndo();
      const k = candKey(i, v);
      // A candidate edit invalidates the last check (and its auto-generated links).
      lastCheck = null;
      clearCheckResult();
      // Remove any truths that included this candidate.
      const before = userTruths.length;
      userTruths = userTruths.filter(t => !t.keySet.has(k));
      if (userTruths.length !== before) setStatus('Candidate deleted — affected truths removed.', 'info');
      cands[i].delete(v);
      buildGrid();
      applyAllHighlights();
      renderTruthSVG();
      renderTruthPanel();
    } else {
      // Select cell for keyboard digit entry
      selIdx = i;
      document.querySelectorAll('.cell.sel').forEach(el => el.classList.remove('sel'));
      cellDiv.classList.add('sel');
    }
  });

  // Mousemove: update drag line, or drag-paint highlights
  document.addEventListener('mousemove', e => {
    if (drawState) { updateDragLine(e.clientX, e.clientY); return; }
    if (paintOp) {
      const cell = document.elementFromPoint(e.clientX, e.clientY);
      const cellDiv = cell && cell.closest('.cell');
      if (cellDiv) applyPaint(+cellDiv.dataset.idx);
    }
  });

  // Stop the paint stroke on release (anywhere)
  document.addEventListener('mouseup', () => { paintOp = null; });

  // Clicking anywhere outside the grid clears the Edit-mode cell selection
  document.addEventListener('mousedown', e => {
    if (selIdx < 0 || e.target.closest('#grid')) return;
    selIdx = -1;
    document.querySelectorAll('.cell.sel').forEach(el => el.classList.remove('sel'));
  });

  // Mouseup: complete drag
  document.addEventListener('mouseup', e => {
    if (!drawState) return;
    const fromKey = drawState.fromKey;
    drawState = null;
    clearDragLine();

    const target = document.elementFromPoint(e.clientX, e.clientY);
    const candSpan = target && target.closest('.cand.present');
    const cellDiv  = target && target.closest('.cell');
    if (!candSpan || !cellDiv) return;

    const toKey = candKey(+cellDiv.dataset.idx, +candSpan.dataset.val);
    const truth = truthFromDrag(fromKey, toKey);
    if (!truth) {
      setStatus('Invalid drag — candidates must share a unit (same digit) or be in the same cell.', 'err');
      return;
    }
    registerTruth(truth);
  });

  // Keyboard: place digit in selected cell (edit mode)
  document.addEventListener('keydown', e => {
    if (selIdx < 0 || userMode !== 'edit') return;
    const d = parseInt(e.key);
    if (!d || d < 1 || d > 9) return;
    if (given[selIdx]) return; // already filled

    // Check for conflicts
    const conflict = CELL_UNITS[selIdx].some(u =>
      UNIT_CELLS[u].some(j => given[j] === d));
    if (conflict) {
      setStatus(`Conflict: ${d} already placed in a shared unit.`, 'err');
      return;
    }

    pushUndo();
    placeDigit(selIdx, d);
    // Placing a digit invalidates the last check (and its auto-generated links), and
    // removes any truth whose keys are no longer fully live.
    lastCheck = null;
    clearCheckResult();
    userTruths = userTruths.filter(t => t.keys.every(k => cands[keyCell(k)].has(keyDigit(k))));
    const placedAt = cellName(selIdx);
    selIdx = -1;
    buildGrid();
    applyAllHighlights();
    renderTruthSVG();
    renderTruthPanel();
    setStatus(`Placed ${d} at ${placedAt}.`, 'info');
  });
}

// ── Entry ──────────────────────────────────────────────────────────────────

// Returns a unique solution array (81 digits) or null if none/ambiguous.
function solvePuzzle(givens) {
  const board = [...givens];
  let solutions = 0;
  let result = null;

  function canPlace(pos, d) {
    const r = Math.floor(pos / 9), c = pos % 9, b = Math.floor(r / 3) * 3 + Math.floor(c / 3);
    for (let i = 0; i < 9; i++) {
      if (board[r * 9 + i] === d) return false;
      if (board[i * 9 + c] === d) return false;
      if (board[(Math.floor(b / 3) * 3 + Math.floor(i / 3)) * 9 + (b % 3) * 3 + i % 3] === d) return false;
    }
    return true;
  }

  function solve() {
    if (solutions > 1) return;
    let pos = -1;
    for (let i = 0; i < 81; i++) { if (!board[i]) { pos = i; break; } }
    if (pos === -1) { if (++solutions === 1) result = [...board]; return; }
    for (let d = 1; d <= 9; d++) {
      if (canPlace(pos, d)) { board[pos] = d; solve(); board[pos] = 0; }
    }
  }

  solve();
  return solutions === 1 ? result : null;
}

// ── Save / restore full puzzle state ────────────────────────────────────────
// Serialise given digits, solved cells and every cell's candidate set into one string that
// round-trips through the input + Load. Format: 'SSv1' + digits(81) + solved-flags(81) +
// candidate bitmasks (81 cells × 2 base-36 chars each), then an OPTIONAL truths suffix:
//   'T' followed by one 3-char record per truth —
//      'C' + cell index (base-36, 2 chars)        → a cell truth
//      'U' + digit (1-9) + unit index (base-36)   → a row / column / box truth
// The suffix is omitted entirely when no truths are drawn, so such a string is byte-identical to
// the old format, and older strings (which simply have no suffix) still load unchanged.
const STATE_LEN = 4 + 81 + 81 + 162;

// The original puzzle: `given` also holds user-solved digits, so zero out anything in solvedCells
// to get just the starting givens. Loads through the plain 81-digit path.
function puzzleString() {
  return given.map((d, i) => (solvedCells.has(i) ? 0 : d)).join('');
}

function serializeState(includeTruths = true) {
  const digits = given.join('');
  const solved = Array.from({ length: 81 }, (_, i) => (solvedCells.has(i) ? '1' : '0')).join('');
  const cs = Array.from({ length: 81 }, (_, i) => {
    let mask = 0;
    for (const d of cands[i]) mask |= 1 << (d - 1);
    return mask.toString(36).padStart(2, '0');
  }).join('');
  // Truths are stored by IDENTITY (which cell / which digit+unit), not by their candidate keys, so
  // they rebuild correctly against the restored candidate grid.
  const truths = includeTruths ? userTruths.map(t => t.isCellTruth
    ? 'C' + keyCell(t.fromKey).toString(36).padStart(2, '0')
    : 'U' + t.digit + t.unit.toString(36)).join('') : '';
  return 'SSv1' + digits + solved + cs + (truths ? 'T' + truths : '');
}

// ── Copy dialog ─────────────────────────────────────────────────────────────
// Three progressively richer forms, all of which paste back into the input and load:
//   puzzle → the original givens (81 digits)
//   state  → givens + solved digits + every candidate set
//   move   → the above plus the drawn truths
async function copyText(str, what) {
  try {
    await navigator.clipboard.writeText(str);
    setStatus(`${what} copied to clipboard.`, 'ok');
  } catch (e) {
    // Clipboard unavailable → drop it in the input so the user can copy it manually.
    const inp = document.getElementById('puzzle-input');
    inp.value = str; inp.focus(); inp.select();
    setStatus('Couldn’t reach the clipboard — string placed in the box; press Ctrl/Cmd-C.', 'err');
  }
}

function openCopyDialog() {
  // Live counts so it's clear what each option will actually carry.
  const nSolved = solvedCells.size, nTruths = userTruths.length;
  const plural = (n, w) => `${n} ${w}${n === 1 ? '' : 's'}`;
  document.getElementById('dlg-d2').textContent =
    `Solved digits and current candidates — ${plural(nSolved, 'solved cell')}.`;
  document.getElementById('dlg-d3').textContent = nTruths
    ? `Current state plus ${plural(nTruths, 'truth')}.`
    : 'Current state — no truths drawn yet, so same as above.';
  const d = document.getElementById('copy-dialog');
  d.showModal();
  // showModal() auto-focuses the first focusable descendant — the first option — and Chrome treats
  // that as :focus-visible, so it opens with a blue ring on "Copy puzzle string". Move focus to the
  // dialog itself (tabindex="-1") so nothing looks pre-selected. Esc, the focus trap and Tab rings
  // all still work; Tab from here lands on the first option with a proper ring.
  d.focus();
}

function copyAs(kind) {
  document.getElementById('copy-dialog').close();
  if (kind === 'puzzle') return copyText(puzzleString(), 'Puzzle string');
  if (kind === 'state')  return copyText(serializeState(false), 'Current state');
  return copyText(serializeState(true), 'Exact move');
}

// Load a state string produced by serializeState(). Returns false (and alerts) if malformed.
function loadSavedState(str) {
  if (str.length < STATE_LEN) { alert('That doesn’t look like a saved-puzzle string.'); return false; }
  const digits = str.slice(4, 85), solved = str.slice(85, 166), cs = str.slice(166, STATE_LEN);
  const suffix = str.slice(STATE_LEN);   // '' (old format) or 'T' + 3 chars per truth
  if (!/^[0-9]{81}$/.test(digits) || !/^[01]{81}$/.test(solved)) { alert('Saved-puzzle string is corrupt.'); return false; }
  if (suffix && !/^T([CU]..)+$/.test(suffix)) { alert('Saved-puzzle string is corrupt (truths).'); return false; }
  given = Array.from(digits, c => +c);
  solvedCells = new Set();
  for (let i = 0; i < 81; i++) if (solved[i] === '1') solvedCells.add(i);
  // Solution comes from the ORIGINAL givens (solved cells excluded), matching a fresh Load.
  solution = solvePuzzle(given.map((d, i) => (solvedCells.has(i) ? 0 : d)));
  cands = Array.from({ length: 81 }, () => new Set());
  for (let i = 0; i < 81; i++) {
    const mask = parseInt(cs.slice(i * 2, i * 2 + 2), 36) || 0;
    for (let d = 1; d <= 9; d++) if (mask & (1 << (d - 1))) cands[i].add(d);
  }
  userTruths = []; lastCheck = null; selIdx = -1;
  cellColors.fill(null);
  undoStack = []; updateUndoButton();
  // Rebuild the truths now that the candidate grid is in place (their keys derive from it).
  // Anything that no longer forms a valid truth — a cell down to one candidate, a unit with none
  // of that digit left — is skipped rather than aborting the whole load.
  let skipped = 0;
  for (let i = 1; i + 3 <= suffix.length; i += 3) {   // i starts past the 'T'; no-op when suffix is ''
    const rec = suffix.slice(i, i + 3);
    const t = rec[0] === 'C'
      ? cellTruthFromClick(parseInt(rec.slice(1), 36))
      : truthFromUnit(+rec[1], parseInt(rec[2], 36));
    if (t && !userTruths.some(x => x.sig === t.sig)) { t.color = truthTypeColor(t); userTruths.push(t); }
    else skipped++;
  }
  buildGrid(); applyAllHighlights(); renderTruthSVG(); renderTruthPanel(); clearCheckResult();
  history.replaceState(null, '', '#' + str);
  const note = userTruths.length ? ` (${userTruths.length} truth${userTruths.length !== 1 ? 's' : ''} restored${skipped ? `, ${skipped} skipped` : ''})` : '';
  setStatus('Saved puzzle loaded.' + note, 'ok');
  return true;
}

function loadPuzzle() {
  const raw = document.getElementById('puzzle-input').value.trim();
  if (/^SSv1/i.test(raw)) { loadSavedState(raw); return; }
  const s = raw.replace(/\./g, '0');
  if (!/^[0-9]{81}$/.test(s)) {
    alert('Enter exactly 81 digits (0 for empty cells).');
    return;
  }
  given      = Array.from(s, c => +c);
  solution   = solvePuzzle(given);
  solvedCells = new Set();
  userTruths  = [];
  lastCheck   = null;
  selIdx      = -1;
  cellColors.fill(null); // loading a new puzzle clears cosmetic highlights
  undoStack = [];        // a new puzzle is not undoable and resets history
  updateUndoButton();
  initCandidates();
  buildGrid();
  renderTruthSVG();
  renderTruthPanel();
  clearCheckResult();
  history.replaceState(null, '', '#' + s);
  setStatus('Puzzle loaded.', 'info');
}

// Scale the fixed 648px board to fit the space its flex cell offers (width AND height),
// then realign the SVG overlay. `zoom` shrinks the layout footprint too, and
// getBoundingClientRect reflects it, so renderTruthSVG stays pixel-aligned at any scale.
const BOARD_PX = 648;
let fitting = false;
function fitBoard() {
  if (fitting) return;                 // guard against re-entrancy from the observer
  const fit = document.getElementById('board-fit');
  const wrap = document.getElementById('grid-wrap');
  if (!fit || !wrap) return;
  // The legend shares this row with the board, so the board only gets what's left after it.
  // (Wide layout only — when they stack vertically the legend takes height, not width.) The
  // legend's width is content-driven and unaffected by the board's zoom, so there's no feedback loop.
  const legend = document.getElementById('legend');
  const stacked = getComputedStyle(fit).flexDirection === 'column';
  const gap = parseFloat(getComputedStyle(fit).gap) || 0;
  const legendW = (legend && !stacked && legend.offsetParent) ? legend.getBoundingClientRect().width + gap : 0;
  const availW = fit.clientWidth - legendW, availH = fit.clientHeight;
  if (availW < 2 || availH < 2) return;
  const z = Math.min(1, availW / BOARD_PX, availH / BOARD_PX);
  fitting = true;
  wrap.style.zoom = z;
  renderTruthSVG();                    // realign the overlay to the new scale
  fitting = false;
}

window.addEventListener('load', () => {
  setupDragHandlers();
  buildPalette();
  buildLegend();
  updateModeHint();
  // Clicking the backdrop dismisses the copy dialog, same as Cancel. A backdrop click targets the
  // <dialog> element itself, while anything inside targets a child — and since the dialog has no
  // padding, its children cover the whole interior, so this can't misfire on an option.
  const copyDlg = document.getElementById('copy-dialog');
  copyDlg.addEventListener('click', e => { if (e.target === copyDlg) copyDlg.close(); });
  const hash = location.hash.slice(1);
  if (/^SSv1/i.test(hash) || /^[0-9.]{81}$/.test(hash)) {
    document.getElementById('puzzle-input').value = hash;
  }
  loadPuzzle();
  // Keep the board sized to its cell. window.resize covers viewport changes; the
  // ResizeObserver covers cell changes driven by rail/legend content reflow.
  window.addEventListener('resize', fitBoard);
  new ResizeObserver(fitBoard).observe(document.getElementById('board-fit'));
  fitBoard();
});
</script>
</body>
</html>
